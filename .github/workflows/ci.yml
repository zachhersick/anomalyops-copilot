name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: anomalyops
          POSTGRES_PASSWORD: anomalyops
          POSTGRES_DB: anomalyops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anomalyops -d anomalyops_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://anomalyops:anomalyops@localhost:5432/anomalyops_test
      ANOMALYOPS_TEST_DATABASE_URL: postgresql+psycopg://anomalyops:anomalyops@localhost:5432/anomalyops_test
      OPENAI_API_KEY: test-key

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Run unit tests
        run: pytest -m "not integration"

      - name: Run integration tests
        run: pytest -m integration